<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Flashcard Thông Minh</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="menu" class="menu-container">
        <h1>📚 Ôn Tập Hệ Điều Hành</h1>
        <div class="grid">
            <button class="btn-chuong" onclick="loadData('chuong1.txt', 'Chương 1')">Chương 1</button>
            <button class="btn-chuong" onclick="loadData('chuong2.txt', 'Chương 2')">Chương 2</button>
            <button class="btn-chuong" onclick="loadData('chuong3.txt', 'Chương 3')">Chương 3</button>
            <button class="btn-chuong" onclick="loadData('chuong4.txt', 'Chương 4')">Chương 4</button>
            <button class="btn-chuong" onclick="openLocalFile()">Mở file .txt (tự chọn)</button>
        </div>
        <input id="file-input" type="file" accept=".txt" class="hidden" onchange="loadFromFile(event)" />
        <div id="error" class="hidden" style="margin-top: 15px; color: #c0392b; text-align: center;"></div>
    </div>

    <div id="quiz" class="quiz-container hidden">
        <button class="back-btn" onclick="goBack()">⬅ Quay lại menu</button>
        <h2 id="title-chuong"></h2>
        <div id="flashcard-list"></div>
    </div>

    <script>
        function showError(message) {
            const err = document.getElementById('error');
            err.textContent = message;
            err.classList.remove('hidden');
        }

        function clearError() {
            const err = document.getElementById('error');
            err.textContent = '';
            err.classList.add('hidden');
        }

        function openLocalFile() {
            document.getElementById('file-input').click();
        }

        async function loadData(fileName, title) {
            clearError();
            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error("Không tìm thấy file dữ liệu!");
                const text = await response.text();
                renderFlashcards(text, title);
            } catch (error) {
                showError("Không thể tải file. Hãy chạy trang web bằng Live Server / GitHub Pages hoặc sử dụng tính năng mở file để chọn file .txt.");
                console.warn(error);
            }
        }

        function loadFromFile(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                renderFlashcards(reader.result, file.name);
            };
            reader.onerror = () => {
                showError('Không thể đọc file đã chọn. Vui lòng thử lại.');
            };
            reader.readAsText(file, 'UTF-8');
        }

        function renderFlashcards(text, title) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            const listArea = document.getElementById('flashcard-list');
            listArea.innerHTML = "";

            // Hỗ trợ nhiều định dạng: 'Câu? -> Đáp án', 'Câu? | Đáp án', hoặc chỉ dùng ' - '
            const separators = ['|', '->'];

            let cardCount = 0;
            lines.forEach((line) => {
                let parts = null;
                for (const sep of separators) {
                    if (line.includes(sep)) {
                        parts = line.split(sep);
                        break;
                    }
                }

                if (!parts || parts.length < 2) return;

                let question = parts[0].trim();
                // Nếu file đã có tiền tố "Câu 1:" thì loại bỏ để tránh bị lặp
                question = question.replace(/^Câu\s*\d+\s*[:\.-]?\s*/i, '').trim();
                const answer = parts.slice(1).join(separators.find(s => line.includes(s))).trim();
                if (!question || !answer) return;

                cardCount += 1;
                const card = document.createElement('div');
                card.className = 'flashcard';
                card.innerHTML = `
                    <div class="question">Câu ${cardCount}: ${question}</div>
                    <div class="answer">${answer}</div>
                `;
                card.onclick = () => card.classList.toggle('active');
                listArea.appendChild(card);
            });

            if (cardCount === 0) {
                showError('Không tìm thấy câu hỏi/đáp án phù hợp trong file. Hãy dùng định dạng: "Câu ... -> Đáp án" hoặc "Câu ... | Đáp án".');
                return;
            }

            document.getElementById('menu').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            document.getElementById('title-chuong').innerText = title;
        }

        function goBack() {
            document.getElementById('menu').classList.remove('hidden');
            document.getElementById('quiz').classList.add('hidden');
        }
    </script>
</body>
</html>
